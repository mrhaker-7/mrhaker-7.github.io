<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost_OS Intelligence</title>
    <style>
        body { background: #0d0208; color: #00FF41; font-family: monospace; margin: 0; padding: 15px; }
        #terminal-output { height: 80vh; overflow-y: auto; margin-bottom: 10px; }
        .input-area { display: flex; border-top: 1px solid #333; padding-top: 10px; }
        input { background: transparent; border: none; color: #00FF41; outline: none; flex: 1; font-family: monospace; }
        p { margin: 2px 0; }
    </style>
</head>
<body>

<div id="terminal-output">
    <p style="color:white">GHOST_OS IS LIVE. IF YOU CAN READ THIS, SCRIPT IS WORKING.</p>
</div>

<div class="input-area">
    <span>></span>
    <input type="text" id="command-input" autofocus>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4a-n2SG7SXYAmc7preydTChKYphkzpxo",
        authDomain: "ghost-os-8f445.firebaseapp.com",
        projectId: "ghost-os-8f445",
        storageBucket: "ghost-os-8f445.firebasestorage.app",
        messagingSenderId: "1097985809108",
        appId: "1:1097985809108:web:45eddccb18d9b8e409b941"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const output = document.getElementById('terminal-output');
    const input = document.getElementById('command-input');

    function print(text, color = "#00FF41") {
        const p = document.createElement('p');
        p.style.color = color;
        p.innerText = text;
        output.appendChild(p);
        output.scrollTop = output.scrollHeight;
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            print(`[ACCESS]: Logged in as ${user.email}`);
        } else {
            print("[SYSTEM]: LOCKED. Use 'signup' or 'login'", "red");
        }
    });

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter') {
            const val = input.value;
            const args = val.split(' ');
            const cmd = args[0].toLowerCase();
            input.value = '';
            
            print(`> ${val}`, "#555");

            try {
                if (cmd === 'signup') {
                    await createUserWithEmailAndPassword(auth, args[1], args[2]);
                    print("[SUCCESS]: Account Created", "white");
                } else if (cmd === 'login') {
                    await signInWithEmailAndPassword(auth, args[1], args[2]);
                    print("[SUCCESS]: Logged In", "white");
                } else if (cmd === 'clear') {
                    output.innerHTML = '';
                } else {
                    print(`Unknown: ${cmd}`);
                }
            } catch (err) {
                print(`[ERROR]: ${err.message}`, "red");
            }
        }
    });
</script>
</body>
</html>
