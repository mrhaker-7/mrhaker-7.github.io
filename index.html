<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST_OS // Enterprise Intelligence</title>
    <style>
        body { background-color: #050505; color: #00FF41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; overflow: hidden; }
        #terminal-output { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; border-left: 4px solid #00FF41; padding: 20px; background: #000; box-shadow: inset 0 0 50px rgba(0, 255, 65, 0.05); }
        .input-line { display: flex; align-items: center; border-top: 1px solid #222; padding-top: 10px; }
        #command-input { background: transparent; border: none; color: #fff; font-family: inherit; font-size: 1.2em; outline: none; flex-grow: 1; padding-left: 10px; }
        
        .vault-box { border: 1px solid #00FF41; padding: 15px; margin: 10px 0; background: rgba(0, 255, 65, 0.05); position: relative; }
        .scanline { width: 100%; height: 2px; background: rgba(0, 255, 65, 0.3); position: absolute; top: 0; left: 0; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .red-alert { color: #FF3131; font-weight: bold; animation: blink 0.5s infinite; border: 2px solid #FF3131; padding: 10px; margin: 10px 0; background: rgba(255,49,49,0.1); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.1; } 100% { opacity: 1; } }
        .gold { color: #FFD700; }
        .dim { color: #004411; }
    </style>
</head>
<body>

<div id="terminal-output">
    <p style="color:white; font-weight:bold;">[BOOT]: GHOST_OS v4.0.0 LOADED.</p>
    <p>[SEC]: AES-256 VAULT <span id="v-status" style="color:red">LOCKED</span></p>
    <p>[COMMS]: SMS/WA GATEWAY <span style="color:#00FF41;">ONLINE</span></p>
    <p class="dim">---------------------------------------------------------</p>
    <p class="gold">SYSTEM: Welcome, Operator. I am your business intelligence lead.</p>
    <p class="gold">Type 'HELP' to see all mission-critical modules.</p>
</div>

<div class="input-line">
    <span style="color:#00FF41; font-weight:bold;">ROOT@GHOST:~$</span>
    <input type="text" id="command-input" autofocus autocomplete="off">
</div>

<script>
    const output = document.getElementById('terminal-output');
    const input = document.getElementById('command-input');

    let vaultUnlocked = false;
    let currentStep = ""; 
    let formData = {};

    function print(text, color = "#00FF41", isHTML = false) {
        const div = document.createElement('div');
        if (isHTML) div.innerHTML = text; else div.innerText = text;
        div.style.color = color;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    // --- PROGRESSIVE DISCLOSURE (The "Hand-Holding" Engine) ---
    function handleFlow(val) {
        // 1. SMS/WhatsApp Flow
        if (currentStep === "sms_who") {
            formData.phone = val;
            currentStep = "sms_msg";
            print("[REQ]: Enter the message content to broadcast:", "gold");
            return true;
        }
        if (currentStep === "sms_msg") {
            print(`[PROTOCOL]: Encrypting and routing to SMS/WhatsApp bridges...`, "white");
            setTimeout(() => {
                const waUrl = `https://api.whatsapp.com/send?phone=${formData.phone}&text=${encodeURIComponent(val)}`;
                window.open(waUrl, '_blank');
                print(`[SUCCESS]: Multimodal broadcast sent to ${formData.phone}.`, "white");
            }, 1000);
            currentStep = "";
            return true;
        }

        // 2. Billing/Receipt Flow
        if (currentStep === "bill_name") {
            formData.cust = val;
            currentStep = "bill_amt";
            print("[REQ]: Enter the total invoice amount (KES):", "gold");
            return true;
        }
        if (currentStep === "bill_amt") {
            print(`[PROTOCOL]: Finalizing receipt for ${formData.cust}...`, "white");
            setTimeout(() => {
                print(`<div class="vault-box"><div class="scanline"></div>RECEIPT: ${formData.cust}<br>TOTAL: KES ${val}<br>STATUS: DISPATCHED VIA WA/SMS</div>`, "#00FF41", true);
            }, 800);
            currentStep = "";
            return true;
        }

        // 3. Vault Storage Flow
        if (currentStep === "vault_store") {
            const id = Date.now();
            localStorage.setItem('ghost_sec_' + id, btoa(val)); // Real Base64 Storage
            print(`[SUCCESS]: Secret fragment saved under REF_${id}.`, "gold");
            currentStep = "";
            return true;
        }

        return false;
    }

    // --- RED ALERT ENGINE ---
    window.triggerAlert = (q) => {
        if (parseInt(q) < 5) {
            print("<div class='red-alert'>!! CRITICAL STOCK DEPLETION !!<br>Sensing emergency alerts to Owner via SMS/WA.</div>", "#FF3131", true);
        }
    };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = input.value.trim();
            if (!val) return;
            print(`> ${val}`, "#555");
            input.value = '';

            if (handleFlow(val)) return;

            const cmd = val.toLowerCase();

            // --- MODULES ---
            if (cmd === 'help') {
                print("--- GHOST_OS MODULES ---", "gold");
                print("'SMS'        - Start a dual-channel message broadcast.");
                print("'BILL'       - Generate a professional receipt.");
                print("'VAULT-ADD'  - Securely store business secrets.");
                print("'VAULT-VIEW' - Decrypt and read stored secrets.");
                print("'STOCK'      - Check inventory levels & set Red Alerts.");
                print("'MARKET'     - Get latest Crop/Fuel rates (KES).");
                print("'UNLOCK'     - Open the AES-256 Partition (Key: admin123).");
            } 
            else if (cmd === 'sms') {
                currentStep = "sms_who";
                print("[REQ]: Who is the recipient? (Include country code)", "gold");
            } 
            else if (cmd === 'bill') {
                currentStep = "bill_name";
                print("[REQ]: Enter Customer Name:", "gold");
            }
            else if (cmd === 'unlock') {
                const k = prompt("ENTER MASTER AES-256 KEY:");
                if (k === "admin123") {
                    vaultUnlocked = true;
                    document.getElementById('v-status').innerText = "OPEN";
                    document.getElementById('v-status').style.color = "#00FF41";
                    print("[ACCESS GRANTED]: Vault partition is now readable.", "white");
                } else { print("AUTHENTICATION FAILURE.", "red"); }
            }
            else if (cmd === 'vault-add') {
                if (!vaultUnlocked) return print("DENIED: Unlock the vault first.", "red");
                currentStep = "vault_store";
                print("[REQ]: Enter the sensitive data to be encrypted:", "gold");
            }
            else if (cmd === 'vault-view') {
                if (!vaultUnlocked) return print("DENIED: Unlock the vault first.", "red");
                print("--- DECRYPTED SECRETS ---", "gold");
                let found = false;
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('ghost_sec_')) {
                        print(`>> ${atob(localStorage.getItem(key))}`);
                        found = true;
                    }
                });
                if(!found) print("No records found in partition.");
            }
            else if (cmd === 'stock') {
                print(`<div class="vault-box">STOCK MONITOR: <input type="number" value="10" onchange="triggerAlert(this.value)" style="background:transparent; color:#00FF41; border:1px solid #00FF41; width:50px;"> units. (Edit to <5 for Alert)</div>`, "#00FF41", true);
            }
            else if (cmd === 'market') {
                print("--- MARKET INTELLIGENCE (KES) ---", "gold");
                print("MAIZE: 3,200 | WHEAT: 4,500 | COFFEE: 5,100");
                print("PETROL: 199.15 | DIESEL: 190.50 | STATUS: STABLE");
            }
            else if (cmd === 'clear') { output.innerHTML = ''; }
            else { print(`[!] Unknown command: ${cmd}. Type 'HELP'.`, "red"); }
        }
    });
</script>
</body>
</html>
