<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost_OS Intelligence</title>
    <style>
        body {
            background-color: #0d0208;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }
        #terminal-output {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            white-space: pre-wrap;
        }
        .input-line {
            display: flex;
            align-items: center;
        }
        #command-input {
            background: transparent;
            border: none;
            color: #00FF41;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <div id="terminal-output">
        <p>[SYSTEM]: GHOST_OS INITIALIZED. READY FOR INPUT.</p>
    </div>

    <div class="input-line">
        <span>GHOST_OS ></span>
        <input type="text" id="command-input" autofocus autocomplete="off">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4a-n2SG7SXYAmc7preydTChKYphkzpxo",
            authDomain: "ghost-os-8f445.firebaseapp.com",
            projectId: "ghost-os-8f445",
            storageBucket: "ghost-os-8f445.firebasestorage.app",
            messagingSenderId: "1097985809108",
            appId: "1:1097985809108:web:45eddccb18d9b8e409b941"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const terminal = document.getElementById('terminal-output');
        const inputField = document.getElementById('command-input');

        function print(text, color = "#00FF41") {
            const p = document.createElement('p');
            p.style.color = color;
            p.innerText = text;
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                print(`[ACCESS]: Welcome back, ${user.email}`);
            } else {
                print("[SYSTEM]: ENCRYPTED. Type 'signup email pass' or 'login email pass'.", "#FF3131");
            }
        });

        // The "Enter" key fix for laptops/phones
        inputField.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = inputField.value.trim();
                if (!val) return;

                print(`> ${val}`, "#555");
                inputField.value = '';

                const args = val.split(/\s+/);
                const cmd = args[0].toLowerCase();

                try {
                    if (cmd === 'signup') {
                        await createUserWithEmailAndPassword(auth, args[1], args[2]);
                        print("[SUCCESS]: Account Registered.");
                    } else if (cmd === 'login') {
                        await signInWithEmailAndPassword(auth, args[1], args[2]);
                        print("[SUCCESS]: Access Granted.");
                    } else if (cmd === 'help') {
                        print("AVAILABLE: signup [email] [pass], login [email] [pass], clear");
                    } else if (cmd === 'clear') {
                        terminal.innerHTML = '';
                    } else {
                        print(`[GHOST]: '${cmd}' not recognized. Type 'help'.`);
                    }
                } catch (err) {
                    print(`[ERROR]: ${err.message}`, "#FF3131");
                }
            }
        });
    </script>
</body>
</html>
