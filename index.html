<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST_TERMINAL | mrhaker-7</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow-x: hidden;
        }

        #terminal-output {
            white-space: pre-wrap;
            margin-bottom: 10px;
            line-height: 1.4;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        .prompt {
            color: #00ff41;
            margin-right: 10px;
            font-weight: bold;
        }

        #user-input {
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: inherit;
            font-size: inherit;
            outline: none;
            flex: 1;
            caret-color: #00ff41;
        }

        .system-msg { color: #888; font-size: 12px; }
        .cmd-list { color: #55ff55; }
    </style>
</head>
<body onclick="document.getElementById('user-input').focus()">

    <div id="terminal-output">
[SYSTEM INITIALIZED...]
[USER: mrhaker-7 AUTHENTICATED]
Type 'help' to see available commands.
    </div>

    <div class="input-line">
        <span class="prompt">andy@ghost-system:~$</span>
        <input type="text" id="user-input" autofocus autocomplete="off" spellcheck="false">
    </div>

    <script>
        const input = document.getElementById('user-input');
        const output = document.getElementById('terminal-output');

        // This is the "Brain" of your terminal
        const commands = {
            "help": "Available commands: <br> - <span class='cmd-list'>ls</span>: List projects <br> - <span class='cmd-list'>whoami</span>: Bio <br> - <span class='cmd-list'>vault</span>: Open Ghost Vault <br> - <span class='cmd-list'>clear</span>: Wipe screen",
            "whoami": "User: mrhaker-7<br>Status: Independent Developer<br>Location: Meru, Kenya<br>Specialty: Security & Web UI",
            "ls": "Directory: /projects <br> 1. ghost-vault (SECURE) <br> 2. matrix-rain (ACTIVE) <br> 3. perfume-paradise (SHOP)",
            "vault": "REDIRECTING TO SECURE VAULT...",
            "clear": ""
        };

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const fullInput = input.value.trim().toLowerCase();
                
                // 1. Show the user what they typed
                output.innerHTML += `<div class="prompt">andy@ghost-system:~$ ${fullInput}</div>`;

                // 2. Process the command
                if (fullInput === "clear") {
                    output.innerHTML = "";
                } else if (fullInput === "vault") {
                    setTimeout(() => {
                        window.location.href = "https://mrhaker-7.github.io/ghost-vault/";
                    }, 1000);
                    output.innerHTML += `<div>${commands[fullInput]}</div>`;
                } else if (commands[fullInput]) {
                    output.innerHTML += `<div>${commands[fullInput]}</div>`;
                } else {
                    output.innerHTML += `<div><span style="color:red">Error:</span> Command '${fullInput}' not found. Type 'help' for options.</div>`;
                }

                // 3. Scroll to bottom and reset input
                window.scrollTo(0, document.body.scrollHeight);
                input.value = "";
            }
        });
    </script>
</body>
</html>
