<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost_OS Intelligence</title>
    <style>
        body { background-color: #0d0208; color: #00FF41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; overflow: hidden; }
        #terminal-output { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; border: 1px solid #1a1a1a; padding: 15px; background: rgba(0,0,0,0.9); }
        .input-line { display: flex; align-items: center; border-top: 2px solid #00FF41; padding-top: 10px; }
        #command-input { background: transparent; border: none; color: #00FF41; font-family: inherit; font-size: 1.1em; outline: none; flex-grow: 1; padding-left: 10px; }
        .vault-table { width: 100%; border-collapse: collapse; margin: 15px 0; border: 1px solid #00FF41; background: rgba(0,20,0,0.5); }
        .vault-table th, .vault-table td { border: 1px solid #111; padding: 8px; text-align: left; }
        .table-in { background: #000; border: 1px solid #333; color: #00FF41; width: 92%; padding: 4px; }
        .btn { background: #00FF41; color: #000; border: none; padding: 6px 12px; cursor: pointer; font-weight: bold; margin: 5px 0; border-radius: 3px; }
        .gold { color: #FFD700; }
        .red-alert { color: #FF3131; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="terminal-output">
    <p style="color:white; font-weight:bold;">[SYSTEM]: GHOST_OS v1.9.0 - INTERACTIVE & COMMS ACTIVE.</p>
    <p class="gold">[PROMPT]: Just type a command like 'sms' or 'bill' to start a guided session.</p>
</div>

<div class="input-line">
    <span>GHOST_OS ></span>
    <input type="text" id="command-input" autofocus autocomplete="off">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4a-n2SG7SXYAmc7preydTChKYphkzpxo",
        authDomain: "ghost-os-8f445.firebaseapp.com",
        projectId: "ghost-os-8f445",
        storageBucket: "ghost-os-8f445.firebasestorage.app",
        messagingSenderId: "1097985809108",
        appId: "1:1097985809108:web:45eddccb18d9b8e409b941"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const output = document.getElementById('terminal-output');
    const input = document.getElementById('command-input');

    // --- STATE MACHINE FOR INTERACTIVE PROMPTS ---
    let currentStep = ""; 
    let formData = {};
    let vaultUnlocked = false;

    function print(text, color = "#00FF41", isHTML = false) {
        const div = document.createElement('div');
        if (isHTML) div.innerHTML = text; else div.innerText = text;
        div.style.color = color;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    // --- INTERACTIVE ENGINE ---
    function handleInteractive(val) {
        // SMS INTERACTION
        if (currentStep === "sms_who") {
            formData.phone = val;
            currentStep = "sms_msg";
            print("[SYSTEM]: What is the message content?");
            return true;
        }
        if (currentStep === "sms_msg") {
            print(`[ROUTING]: Sending SMS to ${formData.phone}...`, "gold");
            setTimeout(() => {
                print(`[SUCCESS]: SMS Delivered via Ghost-Link.`, "white");
                // REAL WORLD INTEGRATION: window.open(`https://wa.me/${formData.phone}?text=${encodeURIComponent(val)}`);
            }, 1000);
            currentStep = "";
            return true;
        }

        // BILL INTERACTION
        if (currentStep === "bill_name") {
            formData.customer = val;
            currentStep = "bill_amt";
            print("[SYSTEM]: Total Amount in KES?");
            return true;
        }
        if (currentStep === "bill_amt") {
            print(`--- GENERATING PROFESSIONAL RECEIPT ---`, "white");
            print(`CUSTOMER: ${formData.customer}\nAMOUNT: KES ${val}\nSTATUS: SENT TO WHATSAPP`, "gold");
            currentStep = "";
            return true;
        }
        return false;
    }

    // --- LOW STOCK ALERT MONITOR ---
    function checkStockLevels(qty) {
        if (parseInt(qty) < 5) {
            print("[RED ALERT]: CRITICAL STOCK LEVEL!", "red-alert");
            print("[SYSTEM]: Sending Push Notification to Owner's Phone...", "red-alert");
        }
    }

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const val = input.value.trim();
            if (!val) return;
            print(`> ${val}`, "#555");
            input.value = '';

            // Check if we are in the middle of a question
            if (handleInteractive(val)) return;

            const cmd = val.toLowerCase();

            // --- COMMANDS ---
            if (cmd === 'sms') {
                currentStep = "sms_who";
                print("[SYSTEM]: Who is the recipient? (Enter Phone Number)");
            } 
            else if (cmd === 'bill') {
                currentStep = "bill_name";
                print("[SYSTEM]: Enter Customer Name for Professional Receipt:");
            }
            else if (cmd === 'vault-unlock') {
                const pass = prompt("ENTER AES-256 KEY:");
                if (pass === "admin123") {
                    vaultUnlocked = true;
                    print("[SUCCESS]: Vault Open.", "white");
                }
            }
            else if (cmd === 'stock-check') {
                print(`<table class="vault-table"><tr><th>PRODUCT</th><th>QTY</th></tr><tr><td>Sugar</td><td><input class="table-in" value="3" onchange="checkStockLevels(this.value)"></td></tr></table>`, "#00FF41", true);
                print("[NOTICE]: Change 'Sugar' qty to less than 5 to test the Red Alert.");
            }
            else if (cmd === 'crops') {
                print("[AGRI]: Maize: 3,200 | Wheat: 4,500 | Coffee: 5,200 (KES)");
            }
            else if (cmd === 'fuel') {
                print("[LOGISTICS]: Petrol: 199.15 | Diesel: 190.50 | TREND: STABLE");
            }
            else if (cmd === 'report') {
                print("--- DAILY SUMMARY ---", "gold");
                print("SALES: KES 45,200 | PROFIT: KES 18,300");
            }
            else if (cmd === 'help') {
                print("OPTIONS: sms, bill, stock-check, crops, fuel, report, vault-unlock, clear");
            }
            else if (cmd === 'clear') { output.innerHTML = ''; }
            else { print(`Unknown: ${cmd}. Type 'help'.`, "red"); }
        }
    });

    window.checkStockLevels = checkStockLevels;
</script>
</body>
</html>
