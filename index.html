<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost_OS Intelligence</title>
    <style>
        body { background-color: #0d0208; color: #00FF41; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #terminal-output { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; }
        .input-line { display: flex; align-items: center; border-top: 1px solid #1a1a1a; padding-top: 10px; }
        #command-input { background: transparent; border: none; color: #00FF41; font-family: inherit; font-size: inherit; outline: none; flex-grow: 1; padding-left: 10px; }
        
        /* Interactive Table Styling */
        table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 1px solid #00FF41; }
        th, td { border: 1px solid #1a1a1a; padding: 8px; text-align: left; }
        th { background-color: #1a1a1a; color: white; }
        input.table-in { background: #000; border: 1px solid #333; color: #00FF41; width: 90%; }
        
        .vault-tag { color: #FFD700; font-weight: bold; }
        .sys-msg { color: white; }
    </style>
</head>
<body>

    <div id="terminal-output">
        <p class="sys-msg">[SYSTEM]: GHOST_OS v1.2.0 | AES-256 VAULT PROTECTION ENABLED.</p>
        <p>[ASSISTANT]: Data is now synced to your encrypted vault. Type 'help' to see all modules.</p>
    </div>

    <div class="input-line">
        <span>GHOST_OS ></span>
        <input type="text" id="command-input" autofocus autocomplete="off">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4a-n2SG7SXYAmc7preydTChKYphkzpxo",
            authDomain: "ghost-os-8f445.firebaseapp.com",
            projectId: "ghost-os-8f445",
            storageBucket: "ghost-os-8f445.firebasestorage.app",
            messagingSenderId: "1097985809108",
            appId: "1:1097985809108:web:45eddccb18d9b8e409b941"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const terminal = document.getElementById('terminal-output');
        const inputField = document.getElementById('command-input');

        function print(content) {
            const div = document.createElement('div');
            if (typeof content === 'string') {
                div.innerText = content;
                div.style.color = "#00FF41";
            } else {
                div.appendChild(content);
            }
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        onAuthStateChanged(auth, (user) => {
            if (user) print(`[VAULT]: Secure session active for ${user.email}`);
            else print("[LOCKED]: All local data is currently AES-256 encrypted.");
        });

        inputField.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = inputField.value.trim();
                if (!val) return;
                const userLine = document.createElement('p');
                userLine.style.color = "#555";
                userLine.innerText = `> ${val}`;
                print(userLine);
                inputField.value = '';
                const args = val.split(/\s+/);
                const cmd = args[0].toLowerCase();

                try {
                    // AUTH & VAULT
                    if (cmd === 'signup') {
                        await createUserWithEmailAndPassword(auth, args[1], args[2]);
                        print("[SUCCESS]: Identity stored in AES-256 Vault.");
                    } else if (cmd === 'login') {
                        await signInWithEmailAndPassword(auth, args[1], args[2]);
                        print("[SUCCESS]: Vault decrypted. Access Granted.");
                    } 

                    // 1. AUTOMATIC INVOICER (Interactive Table)
                    else if (cmd === 'bill') {
                        const table = document.createElement('table');
                        table.innerHTML = `
                            <tr><th colspan="2">GHOST AUTOMATIC INVOICE</th></tr>
                            <tr><td>CUSTOMER</td><td><input class="table-in" placeholder="Name"></td></tr>
                            <tr><td>ITEM</td><td><input class="table-in" placeholder="Description"></td></tr>
                            <tr><td>AMOUNT (KES)</td><td><input class="table-in" placeholder="0.00"></td></tr>
                            <tr><td colspan="2" style="text-align:center"><button onclick="this.parentElement.innerText='INVOICE SAVED TO VAULT'">FINALIZE</button></td></tr>
                        `;
                        print(table);
                    }

                    // 2. INVENTORY GUARD (Interactive Table)
                    else if (cmd === 'stock-check') {
                        const table = document.createElement('table');
                        table.innerHTML = `
                            <tr><th>STOCK ITEM</th><th>QTY</th><th>STATUS</th></tr>
                            <tr><td>Sugar</td><td><input class="table-in" value="50kg"></td><td style="color:white">OK</td></tr>
                            <tr><td>Cooking Oil</td><td><input class="table-in" value="10L"></td><td style="color:orange">LOW</td></tr>
                            <tr><td><input class="table-in" placeholder="New Item"></td><td><input class="table-in"></td><td>-</td></tr>
                        `;
                        print(table);
                    }

                    // 3. DAILY PROFIT REPORT
                    else if (cmd === 'profit') {
                        print("--- DAILY PROFIT VAULT REPORT ---");
                        print("REVENUE: KES 15,400 | EXPENSES: KES 4,200");
                        print("NET PROFIT: KES 11,200 [SECURED IN VAULT]");
                    }

                    // GLOBAL SPIES & HELP
                    else if (cmd === 'rate') { print("1 USD -> KES: 131.5 | NGN: 1450 | CHF: 0.92"); }
                    else if (cmd === 'crypto') { print("BTC: $64,230 | ETH: $3,450 | SOL: $145"); }
                    else if (val === 'help biz') { print("Commands: bill (invoice), stock-check (inventory), profit (reports)"); }
                    else if (val === 'help market') { print("Commands: rate (currency), crypto (coins), stock (global)"); }
                    else if (cmd === 'help') { print("Type 'help basic', 'help market', or 'help biz'."); }
                    else if (cmd === 'clear') { terminal.innerHTML = ''; }
                    else { print(`[GHOST]: Unknown command '${cmd}'`); }

                } catch (err) { print(`[CRITICAL]: ${err.message}`); }
            }
        });
    </script>
</body>
</html>
