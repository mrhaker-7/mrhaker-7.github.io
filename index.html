<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST_TERMINAL | mrhaker-7</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        #terminal-output { white-space: pre-wrap; line-height: 1.4; margin-bottom: 10px; }
        .prompt { color: #00ff41; font-weight: bold; margin-right: 10px; }
        .input-line { display: flex; align-items: center; }
        #user-input { background: transparent; border: none; color: #00ff41; font-family: inherit; font-size: inherit; outline: none; flex: 1; }
        .error { color: #ff3333; }
        .cmd-hint { color: #55ff55; font-weight: bold; }
    </style>
</head>
<body onclick="document.getElementById('user-input').focus()">

    <div id="terminal-output">
[SYSTEM INITIALIZED...]
[USER: mrhaker-7 AUTHENTICATED]
-------------------------------
Type <span class="cmd-hint">'help'</span> to begin.
    </div>

    <div class="input-line">
        <span class="prompt">andy@ghost-system:~$</span>
        <input type="text" id="user-input" autofocus autocomplete="off" spellcheck="false">
    </div>

    <script>
        const input = document.getElementById('user-input');
        const output = document.getElementById('terminal-output');

        // These are your system responses
        const commands = {
            "help": "SYSTEM_GUIDE: <br> - 'ls' : Show all projects <br> - 'whoami' : Identity check <br> - 'vault' : Open secure storage <br> - 'clear' : Wipe terminal",
            "whoami": "ID: mrhaker-7 <br> RANK: System Architect <br> REGION: Meru_Sector_254 <br> STATUS: Coding...",
            "ls": "RETRIEVING FILES... <br> [DIR] ghost-vault <br> [DIR] matrix-effect <br> [FILE] terminal-os.sys",
            "vault": "INITIATING SECURE TRANSFER TO GHOST_VAULT... PLEASE WAIT."
        };

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = input.value.trim().toLowerCase();
                
                // 1. Show your command on screen
                output.innerHTML += `<div><span class="prompt">andy@ghost-system:~$</span> ${cmd}</div>`;

                // 2. Handle the logic
                if (cmd === "clear") {
                    output.innerHTML = "[SYSTEM REBOOTED...]<br>Type 'help' for commands.";
                } else if (cmd === "vault") {
                    output.innerHTML += `<div>${commands[cmd]}</div>`;
                    setTimeout(() => {
                        window.location.href = "https://mrhaker-7.github.io/ghost-vault/";
                    }, 2000);
                } else if (commands[cmd]) {
                    output.innerHTML += `<div>${commands[cmd]}</div>`;
                } else if (cmd !== "") {
                    output.innerHTML += `<div><span class="error">COMMAND_NOT_FOUND:</span> ${cmd}</div>`;
                }

                // 3. Reset and scroll
                input.value = "";
                window.scrollTo(0, document.body.scrollHeight);
            }
        });
    </script>
</body>
</html>
