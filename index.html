<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST_OS_V6 | AUTH_GATE</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; margin: 0; }
        #output { white-space: pre-wrap; line-height: 1.6; margin-bottom: 15px; }
        .prompt { color: #00ff41; font-weight: bold; }
        .line { display: flex; align-items: center; background: rgba(0, 255, 65, 0.05); padding: 5px; border-radius: 4px; }
        input { background: transparent; border: none; color: #00ff41; font-family: inherit; font-size: 16px; outline: none; flex: 1; }
        .radar-box { border: 1px double #00ff41; padding: 12px; margin: 10px 0; background: rgba(0,255,65,0.03); border-radius: 8px; }
        .locked { color: #ff0000; font-weight: bold; } /* Red for locked status */
        .unlocked { color: #00ff41; font-weight: bold; }
    </style>
</head>
<body onclick="document.getElementById('in').focus()">

    <div id="output">
[GHOST_SYSTEM_v6.0_INITIALIZED]
[SYSTEM_STATUS: <span id="sys-status" class="locked">LOCKED</span>]
---------------------------------------
RESTRICTED ACCESS. Type <span style="color:#fff">login [password]</span> to proceed.
(Hint: For development, password is <span style="color:#666">ghost7</span>)
    </div>

    <div class="line">
        <span id="terminal-prompt" class="prompt">guest@ghost:~$</span>
        <input type="text" id="in" autofocus autocomplete="off" spellcheck="false">
    </div>

    <script>
        const input = document.getElementById('in');
        const output = document.getElementById('output');
        const sysStatus = document.getElementById('sys-status');
        const prompt = document.getElementById('terminal-prompt');

        let isAuthenticated = false;

        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter') {
                const raw = input.value.trim();
                const cmd = raw.split(' ')[0].toLowerCase();
                const args = raw.substring(cmd.length).trim();
                
                output.innerHTML += `<div><span class="prompt">${prompt.innerText}</span> ${raw}</div>`;

                // --- LOGIN LOGIC ---
                if (cmd === "login") {
                    if (args === "ghost7") {
                        isAuthenticated = true;
                        sysStatus.innerText = "AUTHORIZED";
                        sysStatus.className = "unlocked";
                        prompt.innerText = "mrhaker-7@ghost:~$";
                        output.innerHTML += "<div>[ACCESS_GRANTED] Welcome back, Architect.</div>";
                    } else {
                        output.innerHTML += "<div class='locked'>[ACCESS_DENIED] INVALID_CREDENTIALS</div>";
                    }
                }

                // --- PROTECTED COMMANDS ---
                else if (!isAuthenticated) {
                    output.innerHTML += "<div class='locked'>[ERR] AUTH_REQUIRED. Please login first.</div>";
                }

                else if (cmd === "scan") {
                    output.innerHTML += "<div>[TRACING...]</div>";
                    try {
                        const res = await fetch('https://ipapi.co/json/');
                        const data = await res.json();
                        output.innerHTML += `<div class="radar-box">IP: ${data.ip}<br>ISP: ${data.org}</div>`;
                    } catch (e) { output.innerHTML += "<div>[ERR]</div>"; }
                }

                else if (cmd === "rate") {
                    const res = await fetch('https://open.er-api.com/v6/latest/USD');
                    const data = await res.json();
                    output.innerHTML += `<div class="radar-box">1 USD = ${data.rates.KES.toFixed(2)} KES</div>`;
                }

                else if (cmd === "save") {
                    let notes = JSON.parse(localStorage.getItem('ghost_notes') || "[]");
                    notes.push({text: args, time: new Date().toLocaleString()});
                    localStorage.setItem('ghost_notes', JSON.stringify(notes));
                    output.innerHTML += "<div>[SAVED]</div>";
                }

                else if (cmd === "notes") {
                    let notes = JSON.parse(localStorage.getItem('ghost_notes') || "[]");
                    notes.forEach((n, i) => { output.innerHTML += `<div style="color:#ffff00">${i+1}. ${n.text}</div>`; });
                }

                else if (cmd === "logout") {
                    isAuthenticated = false;
                    sysStatus.innerText = "LOCKED";
                    sysStatus.className = "locked";
                    prompt.innerText = "guest@ghost:~$";
                    output.innerHTML += "<div>[LOGGED_OUT] Session terminated.</div>";
                }

                else if (cmd === "clear") { output.innerHTML = "[SYSTEM_RELOADED]"; }
                else if (cmd === "help") {
                    output.innerHTML += "<div>PUBLIC: login<br>PRIVATE: scan, rate, save, notes, logout, clear</div>";
                }

                input.value = "";
                window.scrollTo(0, document.body.scrollHeight);
            }
        });
    </script>
</body>
</html>
