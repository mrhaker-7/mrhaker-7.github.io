<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost_OS Intelligence</title>
    <style>
        body { background-color: #0d0208; color: #00FF41; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #terminal-output { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; }
        .input-line { display: flex; align-items: center; border-top: 1px solid #1a1a1a; padding-top: 10px; }
        #command-input { background: transparent; border: none; color: #00FF41; font-family: inherit; font-size: inherit; outline: none; flex-grow: 1; padding-left: 10px; }
        .system { color: white; font-weight: bold; }
        .gold { color: #FFD700; }
        .dim { color: #555; }
    </style>
</head>
<body>

    <div id="terminal-output">
        <p class="system">[SYSTEM]: GHOST_OS v1.1.0 - BUSINESS & INTEL SUITE ACTIVE.</p>
        <p class="gold">[ASSISTANT]: Welcome back, Architect. Type 'tutorial' to start the Ghost Assistant.</p>
    </div>

    <div class="input-line">
        <span>GHOST_OS ></span>
        <input type="text" id="command-input" autofocus autocomplete="off">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4a-n2SG7SXYAmc7preydTChKYphkzpxo",
            authDomain: "ghost-os-8f445.firebaseapp.com",
            projectId: "ghost-os-8f445",
            storageBucket: "ghost-os-8f445.firebasestorage.app",
            messagingSenderId: "1097985809108",
            appId: "1:1097985809108:web:45eddccb18d9b8e409b941"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const terminal = document.getElementById('terminal-output');
        const inputField = document.getElementById('command-input');

        function print(text, color = "#00FF41") {
            const p = document.createElement('p');
            p.style.color = color;
            p.innerText = text;
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        }

        onAuthStateChanged(auth, (user) => {
            if (user) print(`[ACCESS]: User ${user.email} Authenticated.`, "white");
            else print("[LOCKED]: Authentication Required.", "#FF3131");
        });

        inputField.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = inputField.value.trim();
                if (!val) return;
                print(`> ${val}`, "#555");
                inputField.value = '';
                const args = val.split(/\s+/);
                const cmd = args[0].toLowerCase();

                try {
                    // 1. AUTH & TUTORIAL
                    if (cmd === 'signup') {
                        await createUserWithEmailAndPassword(auth, args[1], args[2]);
                        print("[SUCCESS]: Account Created.");
                    } else if (cmd === 'login') {
                        await signInWithEmailAndPassword(auth, args[1], args[2]);
                        print("[SUCCESS]: Access Granted.");
                    } else if (cmd === 'tutorial') {
                        print("[GHOST ASSISTANT]: Hello! I am your OS Guide.");
                        print("1. Type 'help basic' if you are new.");
                        print("2. Type 'help market' for stock/crypto tracking.");
                        print("3. Type 'help biz' to manage your shop and inventory.");
                    }

                    // 2. SPECIALIZED HELP
                    else if (val === 'help basic') {
                        print("--- BEGINNER COMMANDS ---", "white");
                        print("signup [email] [pass] | login [email] [pass] | clear | tutorial");
                    } else if (val === 'help market') {
                        print("--- INVESTOR COMMANDS ---", "gold");
                        print("rate   : Live currency exchange (KES, NGN, CHF)");
                        print("crypto : Live coin prices (BTC, ETH, SOL)");
                        print("stock  : High-value stock tracker");
                    } else if (val === 'help biz') {
                        print("--- SHOP OWNER COMMANDS ---", "#00bfff");
                        print("bill [item] [price] : Generate automatic invoice");
                        print("stock-check         : Inventory Guard report");
                        print("profit              : Daily Profit Report module");
                    }

                    // 3. TRACKERS & GLOBAL INTEL
                    else if (cmd === 'rate') {
                        print("[INTEL]: USD Exchange -> KES: 131.5 | NGN: 1450 | CHF: 0.92");
                    } else if (cmd === 'crypto') {
                        print("[MARKET]: BTC: $64,230 | ETH: $3,450 | SOL: $145");
                    } else if (cmd === 'stock') {
                        print("[MARKET]: AAPL: $189.43 | TSLA: $175.22 | NVDA: $875.10");
                    }

                    // 4. HIGH-VALUE BUSINESS FEATURES
                    else if (cmd === 'bill') {
                        const item = args[1] || "Service";
                        const price = args[2] || "0";
                        print("--- GHOST AUTOMATIC INVOICE ---", "white");
                        print(`ITEM: ${item} | AMOUNT: KES ${price}`);
                        print(`STATUS: UNPAID | DATE: ${new Date().toLocaleDateString()}`);
                    } else if (cmd === 'stock-check') {
                        print("[INVENTORY GUARD]: Scanning shelves...");
                        print(">> Low Stock Warning: Soda (5 units left)");
                        print(">> Optimal: Flour, Sugar, Cooking Oil.");
                    } else if (cmd === 'profit') {
                        print("[REPORT]: Daily Profit Analysis...");
                        print(">> Total Revenue: KES 15,400");
                        print(">> Expenses: KES 4,200");
                        print(">> NET PROFIT: KES 11,200", "white");
                    }

                    // UTILITIES
                    else if (cmd === 'clear') { terminal.innerHTML = ''; }
                    else if (cmd === 'help') { print("Type 'help basic', 'help market', or 'help biz'."); }
                    else { print(`Unknown: ${cmd}. Type 'help'.`, "red"); }

                } catch (err) { print(`[ERROR]: ${err.message}`, "#FF3131"); }
            }
        });
    </script>
</body>
</html>
