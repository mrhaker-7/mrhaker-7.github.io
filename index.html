<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost_OS Intelligence</title>
    <style>
        body { background-color: #0d0208; color: #00FF41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; overflow: hidden; }
        #terminal-output { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; border: 1px solid #1a1a1a; padding: 10px; background: rgba(0,0,0,0.9); }
        .input-line { display: flex; align-items: center; border-top: 1px solid #00FF41; padding-top: 10px; }
        #command-input { background: transparent; border: none; color: #00FF41; font-family: inherit; font-size: 1.1em; outline: none; flex-grow: 1; padding-left: 10px; }
        .gold { color: #FFD700; }
        .red { color: #FF3131; font-weight: bold; }
        .white { color: white; }
        .secure-box { border: 1px solid #FF3131; padding: 10px; margin: 10px 0; background: rgba(255, 0, 0, 0.05); }
    </style>
</head>
<body>

<div id="terminal-output">
    <p class="white">[SYSTEM]: GHOST_OS v1.5.5 - SECURE ENTERPRISE EDITION.</p>
    <p>[STATUS]: VAULT IS CURRENTLY <span class="red">SEALED</span>.</p>
</div>

<div class="input-line">
    <span>GHOST_OS ></span>
    <input type="text" id="command-input" autofocus autocomplete="off">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4a-n2SG7SXYAmc7preydTChKYphkzpxo",
        authDomain: "ghost-os-8f445.firebaseapp.com",
        projectId: "ghost-os-8f445",
        storageBucket: "ghost-os-8f445.firebasestorage.app",
        messagingSenderId: "1097985809108",
        appId: "1:1097985809108:web:45eddccb18d9b8e409b941"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const output = document.getElementById('terminal-output');
    const input = document.getElementById('command-input');

    let vaultUnlocked = false; // The Gatekeeper variable

    function print(text, color = "#00FF41", isHTML = false) {
        const div = document.createElement('div');
        if (isHTML) div.innerHTML = text; else div.innerText = text;
        div.style.color = color;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    // --- AUTOMATIC 8:00 PM REPORT ---
    setInterval(() => {
        const now = new Date();
        if (now.getHours() === 20 && now.getMinutes() === 0 && now.getSeconds() === 0) {
            print("--- [AUTOMATIC] 20:00 HOURS BUSINESS SUMMARY ---", "gold");
            print("SALES: KES 45,200 | PROFIT: KES 18,300 | TOP: Sugar");
        }
    }, 1000);

    onAuthStateChanged(auth, (user) => {
        if (user) print(`[AUTH]: SECURE TUNNEL OPEN for ${user.email}`, "white");
        else print("[LOCKED]: Authentication Required for Enterprise Access.", "red");
    });

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const val = input.value.trim();
            if (!val) return;
            print(`> ${val}`, "#555");
            input.value = '';
            const args = val.split(/\s+/);
            const cmd = args[0].toLowerCase();

            try {
                if (cmd === 'signup') {
                    await createUserWithEmailAndPassword(auth, args[1], args[2]);
                    print("[SUCCESS]: Global Vault ID Created.");
                } else if (cmd === 'login') {
                    await signInWithEmailAndPassword(auth, args[1], args[2]);
                    print("[SUCCESS]: Keys Accepted. System Online.");
                }

                // --- NEW SECURITY COMMANDS ---
                else if (cmd === 'vault-unlock') {
                    print("[SECURITY]: Initalizing AES-256 Decryption...", "gold");
                    setTimeout(() => {
                        vaultUnlocked = true;
                        print("[SUCCESS]: VAULT UNSEALED. DATA ACCESSIBLE.", "white");
                    }, 1500);
                }
                else if (cmd === 'vault-lock') {
                    vaultUnlocked = false;
                    print("[SECURITY]: VAULT SEALED AND ENCRYPTED.", "red");
                }

                // --- DATA VAULT (PROTECTED) ---
                else if (cmd === 'vault-add') {
                    if (!vaultUnlocked) return print("ACCESS DENIED: Vault is SEALED. Use 'vault-unlock'.", "red");
                    const secret = val.replace('vault-add', '').trim();
                    if (!secret) return print("Usage: vault-add [data]");
                    localStorage.setItem('ghost_v_' + Date.now(), secret);
                    print("[SUCCESS]: Secret Fragment Stored in Vault.", "gold");
                }
                else if (cmd === 'vault-view') {
                    if (!vaultUnlocked) return print("CRITICAL ERROR: Unauthorized access attempt. Use 'vault-unlock'.", "red");
                    print("--- DECRYPTED VAULT DATA ---", "gold");
                    let found = false;
                    for (let i = 0; i < localStorage.length; i++) {
                        const key = localStorage.key(i);
                        if (key.startsWith('ghost_v_')) {
                            print(`>> [${new Date(parseInt(key.split('_')[2])).toLocaleTimeString()}]: ${localStorage.getItem(key)}`);
                            found = true;
                        }
                    }
                    if (!found) print("Vault is empty.");
                }

                // --- ALL OTHER FEATURES (STILL HERE) ---
                else if (cmd === 'sys') {
                    print("--- GHOST_OS SYSTEM SPECS ---", "white");
                    print("CORE: v1.5.5 | VAULT: " + (vaultUnlocked ? "UNSEALED" : "SEALED"));
                    print("SECURITY: AES-256 | REGION: KENYA-EAST-1");
                }
                else if (cmd === 'crops') {
                    print("[AGRI]: Maize: 3,200 | Wheat: 4,500 | Coffee: 5,200 (KES)");
                }
                else if (cmd === 'fuel') {
                    print("[LOGISTICS]: Petrol: 199.15 | Diesel: 190.50 | Trend: STABLE");
                }
                else if (cmd === 'report') {
                    print("--- MANUAL REPORT TRIGGERED ---", "gold");
                    print("SALES: KES 45,200 | PROFIT: KES 18,300 | TOP: Sugar");
                }
                else if (cmd === 'tutorial') {
                    print("--- GHOST ASSISTANT ---", "gold");
                    print("1. Login first.");
                    print("2. Type 'vault-unlock' to open your private data.");
                    print("3. Type 'vault-add [text]' to store secrets.");
                    print("4. Use 'crops' and 'fuel' for business intel.");
                }
                else if (cmd === 'help') {
                    print("COMMANDS: signup, login, sys, vault-unlock, vault-lock, vault-add, vault-view, report, crops, fuel, tutorial, clear");
                }
                else if (cmd === 'clear') { output.innerHTML = ''; }
                else { print(`Unknown command: ${cmd}`, "red"); }

            } catch (err) { print(`[CRITICAL]: ${err.message}`, "red"); }
        }
    });
</script>
</body>
</html>
