<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost_OS Intelligence</title>
    <style>
        body { background-color: #0d0208; color: #00FF41; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 95vh; }
        #terminal-output { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; white-space: pre-wrap; }
        .input-line { display: flex; align-items: center; }
        #command-input { background: transparent; border: none; color: #00FF41; font-family: inherit; font-size: inherit; outline: none; flex-grow: 1; padding-left: 10px; }
    </style>
</head>
<body>

    <div id="terminal-output">
        <p>[SYSTEM]: GHOST_OS CORE v1.0.5 - GLOBAL INTEL ACTIVE.</p>
    </div>

    <div class="input-line">
        <span>GHOST_OS ></span>
        <input type="text" id="command-input" autofocus autocomplete="off">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4a-n2SG7SXYAmc7preydTChKYphkzpxo",
            authDomain: "ghost-os-8f445.firebaseapp.com",
            projectId: "ghost-os-8f445",
            storageBucket: "ghost-os-8f445.firebasestorage.app",
            messagingSenderId: "1097985809108",
            appId: "1:1097985809108:web:45eddccb18d9b8e409b941"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const terminal = document.getElementById('terminal-output');
        const inputField = document.getElementById('command-input');

        function print(text, color = "#00FF41") {
            const p = document.createElement('p');
            p.style.color = color;
            p.innerText = text;
            terminal.appendChild(p);
            terminal.scrollTop = terminal.scrollHeight;
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                print(`[ACCESS]: Welcome, Architect. Global Spy Modules Online.`);
            } else {
                print("[SYSTEM]: ENCRYPTED. Please 'login' to access Global Features.", "#FF3131");
            }
        });

        inputField.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = inputField.value.trim();
                if (!val) return;

                print(`> ${val}`, "#555");
                inputField.value = '';

                const args = val.split(/\s+/);
                const cmd = args[0].toLowerCase();

                try {
                    // AUTH COMMANDS
                    if (cmd === 'signup') {
                        await createUserWithEmailAndPassword(auth, args[1], args[2]);
                        print("[SUCCESS]: Account Registered.");
                    } else if (cmd === 'login') {
                        await signInWithEmailAndPassword(auth, args[1], args[2]);
                        print("[SUCCESS]: Access Granted.");
                    } 
                    
                    // NEW: GLOBAL SPY COMMANDS
                    else if (cmd === 'rate') {
                        print("[INTEL]: Fetching Global Exchange Rates...");
                        print("1 USD = 131.50 KES (Kenya)");
                        print("1 USD = 1,450.00 NGN (Nigeria)");
                        print("1 USD = 0.92 CHF (Switzerland)");
                    } 
                    else if (cmd === 'crypto') {
                        print("[INTEL]: Fetching Live Crypto Market...");
                        print("BTC: $64,230 | ETH: $3,450 | SOL: $145");
                    }
                    else if (cmd === 'sys') {
                        print("[SYSTEM INFO]:");
                        print("> OS: GHOST_OS v1.0.5");
                        print("> REGION: KENYA (AFRICA)");
                        print("> CLOUD: FIREBASE SECURE");
                    }

                    // UTILITY COMMANDS
                    else if (cmd === 'help') {
                        print("--- CORE COMMANDS ---");
                        print("signup [email] [pass], login [email] [pass], clear");
                        print("--- GLOBAL SPY MODULES ---");
                        print("rate   : Global currency exchange");
                        print("crypto : Live coin market data");
                        print("sys    : View system architecture");
                    } else if (cmd === 'clear') {
                        terminal.innerHTML = '';
                    } else {
                        print(`[GHOST]: '${cmd}' not recognized. Type 'help'.`);
                    }
                } catch (err) {
                    print(`[ERROR]: ${err.message}`, "#FF3131");
                }
            }
        });
    </script>
</body>
</html>
